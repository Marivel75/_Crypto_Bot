# Alembic configuration file.
# This file is read by `alembic` commands.
# The sqlalchemy.url here is a placeholder — it is overridden at runtime by
# alembic/env.py, which reads the real URL from src.shared.config.settings.

[alembic]
script_location = src/etl/migrations
prepend_sys_path = .
version_path_separator = os

# Placeholder URL — overridden at runtime by env.py via src.shared.config.settings
sqlalchemy.url = postgresql+asyncpg://user:pass@localhost/dbname

[post_write_hooks]
# No post-write hooks configured.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
