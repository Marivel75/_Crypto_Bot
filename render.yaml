services:
  - type: web
    name: crypto-bot-api
    runtime: docker
    dockerfilePath: ./api/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: CRYPTO_BOT_DB_URL
        sync: false  # à saisir dans le dashboard Render : SUPABASE_POSTGRES_URL

      - key: BINANCE_API_KEY
        sync: false

      - key: BINANCE_API_SECRET
        sync: false

      - key: COINMARKETCAP_API_KEY
        sync: false

      - key: CRYPTORANK_API_KEY
        sync: false

      - key: ALERT_EMAIL_TO
        sync: false

      - key: ALERT_EMAIL_FROM
        sync: false

      - key: ALERT_EMAIL_PASSWORD
        sync: false

      - key: ALERT_SMTP_HOST
        value: smtp.gmail.com

      - key: ALERT_SMTP_PORT
        value: "587"

      - key: MLFLOW_TRACKING_URI
        value: https://dagshub.com/Marivel75/_Crypto_Bot.mlflow

      - key: MLFLOW_TRACKING_USERNAME
        value: Marivel75

      - key: MLFLOW_TRACKING_PASSWORD
        sync: false

      - key: PYTHONUNBUFFERED
        value: "1"
