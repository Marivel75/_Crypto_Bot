global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: "cryptobot"
    environment: "production"

scrape_configs:
  # FastAPI backend metrics
  - job_name: "api"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "api"

  # PostgreSQL / TimescaleDB metrics (via postgres-exporter)
  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "timescaledb"

  # Nginx metrics
  - job_name: "nginx"
    static_configs:
      - targets: ["nginx-exporter:9113"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "nginx"

  # MLflow server metrics (if MLflow exposes Prometheus metrics)
  - job_name: "mlflow"
    metrics_path: /metrics
    static_configs:
      - targets: ["mlflow:5000"]
    scrape_interval: 30s
    scrape_timeout: 10s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "mlflow"

  # Node exporter — Linux system metrics (uncomment on production VPS)
  # - job_name: "node"
  #   static_configs:
  #     - targets: ["node-exporter:9100"]
  #   relabel_configs:
  #     - source_labels: [__address__]
  #       target_label: instance
  #       replacement: "vps"

  # cAdvisor — Docker container metrics (uncomment on production VPS)
  # - job_name: "cadvisor"
  #   static_configs:
  #     - targets: ["cadvisor:8080"]
  #   relabel_configs:
  #     - source_labels: [__address__]
  #       target_label: instance
  #       replacement: "docker-metrics"

# Alert rules
rule_files:
  - "/etc/prometheus/alert_rules.yml"

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []
          # Uncomment and configure if using Alertmanager
          # - localhost:9093
