---
# Setup HTTPS with Let's Encrypt and certbot
# Usage: ansible-playbook -i inventories/production.ini playbooks/setup-https.yml -e "domain=crypto-bot.example.com email=admin@example.com"
#
# NOTES:
# - Requires public domain and email address
# - Certbot will attempt to validate domain ownership via HTTP challenge
# - Creates auto-renewal via systemd timer
# - Must be run BEFORE deploying Docker Compose

- name: Setup HTTPS with Let's Encrypt
  hosts: vps
  become: true
  vars:
    certbot_dir: /opt/certbot
    letsencrypt_dir: /etc/letsencrypt
    renewal_hook: "docker compose -f {{ docker_compose_dir }}/docker-compose.yml exec -T nginx nginx -s reload"

  pre_tasks:
    - name: Validate required variables
      assert:
        that:
          - domain is defined
          - email is defined
        fail_msg: "domain and email must be provided: ansible-playbook ... -e 'domain=example.com email=admin@example.com'"

  tasks:
    - name: Install certbot and dependencies
      apt:
        name:
          - certbot
          - python3-certbot
          - curl
          - openssl
        state: present
        update_cache: yes

    - name: Create certbot working directory
      file:
        path: "{{ certbot_dir }}"
        state: directory
        mode: '0755'

    - name: Check if certificate already exists
      stat:
        path: "{{ letsencrypt_dir }}/live/{{ domain }}/fullchain.pem"
      register: cert_exists

    - name: Create directory for ACME challenge
      file:
        path: /var/www/certbot/.well-known/acme-challenge
        state: directory
        mode: '0755'
      when: not cert_exists.stat.exists

    - name: Request initial certificate with certbot
      command: >
        certbot certonly
        --webroot
        -w /var/www/certbot
        --non-interactive
        --agree-tos
        --email {{ email }}
        -d {{ domain }}
        --expand
      when: not cert_exists.stat.exists
      register: certbot_result
      changed_when: "'Successfully received certificate' in certbot_result.stdout"

    - name: Create certificate renewal script
      copy:
        content: |
          #!/bin/bash
          # Auto-renewal script for Let's Encrypt certificates
          # Called by systemd timer
          
          set -e
          
          DOMAIN="{{ domain }}"
          CERT_PATH="{{ letsencrypt_dir }}/live/$DOMAIN"
          DOCKER_COMPOSE_DIR="{{ docker_compose_dir }}"
          
          echo "[$(date)] Starting certificate renewal for $DOMAIN"
          
          # Renew certificates
          certbot renew --webroot -w /var/www/certbot --quiet
          
          # If certificate was renewed, reload nginx
          if [ -f "$CERT_PATH/fullchain.pem" ]; then
            # Check certificate expiration
            EXPIRY=$(openssl x509 -enddate -noout -in "$CERT_PATH/fullchain.pem" | cut -d= -f2)
            echo "[$(date)] Certificate expires: $EXPIRY"
            
            # Reload nginx if Docker is running
            if command -v docker &> /dev/null; then
              docker compose -f "$DOCKER_COMPOSE_DIR/docker-compose.yml" exec -T nginx nginx -s reload 2>/dev/null || true
            fi
          fi
          
          echo "[$(date)] Certificate renewal completed"
        dest: /usr/local/bin/certbot-renew.sh
        mode: '0755'

    - name: Create systemd service for certbot renewal
      copy:
        content: |
          [Unit]
          Description=Certbot Renewal Service
          After=network.target
          
          [Service]
          Type=oneshot
          ExecStart=/usr/local/bin/certbot-renew.sh
          StandardOutput=journal
          StandardError=journal
        dest: /etc/systemd/system/certbot-renew.service
        mode: '0644'
      register: systemd_service

    - name: Create systemd timer for certbot renewal
      copy:
        content: |
          [Unit]
          Description=Certbot Renewal Timer (twice daily)
          Requires=certbot-renew.service
          
          [Timer]
          # Run at 02:00 and 14:00 UTC
          OnCalendar=*-*-* 02,14:00:00
          Persistent=true
          
          [Install]
          WantedBy=timers.target
        dest: /etc/systemd/system/certbot-renew.timer
        mode: '0644'
      register: systemd_timer

    - name: Reload systemd daemon
      systemd:
        daemon_reload: yes
      when: systemd_service.changed or systemd_timer.changed

    - name: Enable and start certbot renewal timer
      systemd:
        name: certbot-renew.timer
        enabled: yes
        state: started

    - name: Setup certificate renewal cron (fallback)
      cron:
        name: "Certbot Renewal"
        hour: "2,14"
        minute: "0"
        job: "/usr/local/bin/certbot-renew.sh >> /var/log/certbot-renew.log 2>&1"
        user: root

    - name: Verify certificate installation
      stat:
        path: "{{ letsencrypt_dir }}/live/{{ domain }}/privkey.pem"
      register: privkey_check

    - name: Display certificate info
      command: >
        openssl x509 -in {{ letsencrypt_dir }}/live/{{ domain }}/fullchain.pem
        -text -noout
      register: cert_info
      when: privkey_check.stat.exists

    - name: Show certificate details
      debug:
        msg: |
          HTTPS Setup Complete!
          
          Domain: {{ domain }}
          Certificate Path: {{ letsencrypt_dir }}/live/{{ domain }}/
          Renewal: Automated (systemd timer + cron fallback)
          Expiration: Check with: openssl x509 -in {{ letsencrypt_dir }}/live/{{ domain }}/fullchain.pem -noout -dates
          
          Next Steps:
          1. Update docker-compose.yml to include /etc/letsencrypt volume mount
          2. Update infra/nginx/nginx.conf with your domain name
          3. Restart Docker Compose: docker compose down && docker compose up -d
          4. Test HTTPS: curl -v https://{{ domain }}
          5. Verify redirect: curl -i http://{{ domain }} (should redirect to HTTPS)
