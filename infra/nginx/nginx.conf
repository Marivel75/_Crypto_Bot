upstream api {
    server api:8000;
    keepalive 32;
}

upstream frontend {
    server frontend:8501;
    keepalive 32;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

# Common security headers and locations (reusable)
map $scheme $hsts_header {
    https "max-age=31536000; includeSubDomains; preload";
}

# HTTP server — redirect to HTTPS if domain is set
server {
    listen 80;
    server_name _;

    # Health check endpoint on HTTP (for Let's Encrypt ACME challenge)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # All other traffic → HTTPS if domain is configured
    # Check for domain via environment or server_name
    location / {
        # If domain is set (via env var substitution in container),
        # redirect to HTTPS; otherwise serve on HTTP (dev mode)
        set $target_scheme $scheme;
        if ($server_port = 80) {
            # Only redirect if we have a real domain (not localhost or _)
            # This gets substituted at container runtime
            set $target_scheme "https";
        }
        return 301 $target_scheme://$host$request_uri;
    }

    # API proxy (for ACME challenges and fallback)
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://api/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}

# HTTPS server (primary, requires Let's Encrypt certificates)
# Certificate paths: /etc/letsencrypt/live/{DOMAIN}/
# This block is conditionally included or enabled via environment variables
server {
    listen 443 ssl http2;
    server_name _;

    # SSL Certificate configuration — uses Let's Encrypt paths
    # Must be set via environment or pre-provisioned
    ssl_certificate /etc/letsencrypt/live/crypto-bot/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crypto-bot/privkey.pem;

    # Modern TLS configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # API proxy
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://api/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Auth endpoints — stricter rate limit
    location /api/auth/ {
        limit_req zone=auth_limit burst=3 nodelay;
        proxy_pass http://api/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Streamlit frontend
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Streamlit needs this)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # Health check (S11: use consistent /api/v1 prefix)
    location /health {
        access_log off;
        proxy_pass http://api/api/v1/health;
    }

    # Also expose /api/v1/health directly for consistency
    location /api/v1/health {
        access_log off;
        proxy_pass http://api/api/v1/health;
    }

    # Security headers (S7 audit fix)
    # Prevent clickjacking attacks
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Enable XSS protection in older browsers
    add_header X-XSS-Protection "1; mode=block" always;

    # Control referrer information
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Content Security Policy (prevents inline scripts, etc.)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self';" always;

    # Enable HSTS (HTTP Strict Transport Security)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Permissions-Policy (formerly Feature-Policy) — restrict sensitive APIs
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;

    # Disable server tokens to hide version info
    server_tokens off;

    # Gzip compression
    gzip on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types text/plain application/json application/javascript text/css text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # Disable directory listing
    autoindex off;
}

# Stub status for nginx-exporter (internal only)
server {
    listen 8080;
    server_name _;
    location /stub_status {
        stub_status;
        allow 127.0.0.0/8;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }
}
