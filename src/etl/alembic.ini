[alembic]
# Path to Alembic migration scripts (relative to this file)
script_location = src/etl/migrations

# Database URL — overridden at runtime by env.py reading pydantic-settings.
# Do NOT hardcode real credentials here; this value is used only in offline mode.
sqlalchemy.url = postgresql://cryptobot:password@timescaledb:5432/cryptobot

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
