services:
  mlflow:
    build:
      context: .
      dockerfile: mlflow/Dockerfile
    restart: unless-stopped
    ports:
      - "5001:5000"
    volumes:
      - mlflow-data:/mlflow
    networks:
      - crypto-net

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      CRYPTO_BOT_DB_URL: sqlite:///data/processed/crypto_data.db
      MLFLOW_TRACKING_URI: sqlite:////mlflow/mlflow.db
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - mlflow-data:/mlflow
    depends_on:
      - mlflow
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    networks:
      - crypto-net

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    environment:
      API_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - crypto-net

volumes:
  mlflow-data:

networks:
  crypto-net:
    driver: bridge
