# Docker Compose V2+ (no version field needed)
services:
  # --- Database ---
  timescaledb:
    image: timescale/timescaledb:2.14.2-pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cryptobot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-cryptobot}
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cryptobot}"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 5
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          memory: 1G

  # --- Object Storage ---
  minio:
    image: minio/minio:RELEASE.2025-01-01T21-04-10Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          memory: 512M

  # --- MLflow ---
  mlflow:
    build:
      context: ./src/ml
      dockerfile: Dockerfile.mlflow
    restart: unless-stopped
    environment:
      MLFLOW_TRACKING_URI: http://localhost:5000
      MLFLOW_DEFAULT_ARTIFACT_ROOT: s3://mlflow-artifacts/
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    ports:
      - "127.0.0.1:5000:5000"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://${POSTGRES_USER:-cryptobot}:${POSTGRES_PASSWORD}@timescaledb:5432/${POSTGRES_DB:-cryptobot}
      --default-artifact-root s3://mlflow-artifacts/
    depends_on:
      timescaledb:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          memory: 512M

  # --- Backend API ---
  api:
    build:
      context: .
      dockerfile: src/api/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cryptobot}:${POSTGRES_PASSWORD}@timescaledb:5432/${POSTGRES_DB:-cryptobot}
      MINIO_ENDPOINT: minio:9000
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      timescaledb:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    networks:
      - frontend-net
      - backend-net
    deploy:
      resources:
        limits:
          memory: 512M

  # --- Frontend ---
  frontend:
    build:
      context: .
      dockerfile: src/frontend/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      API_URL: http://api:8000
    ports:
      - "127.0.0.1:8501:8501"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - frontend-net
    deploy:
      resources:
        limits:
          memory: 512M

  # --- ETL Worker ---
  etl-worker:
    build:
      context: .
      dockerfile: src/etl/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cryptobot}:${POSTGRES_PASSWORD}@timescaledb:5432/${POSTGRES_DB:-cryptobot}
      MINIO_ENDPOINT: minio:9000
    depends_on:
      timescaledb:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: [
        "CMD",
        "python",
        "-c",
        "import src.etl; print('ETL service healthy')"
      ]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          memory: 1G

  # --- ML Worker ---
  ml-worker:
    build:
      context: .
      dockerfile: src/ml/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cryptobot}:${POSTGRES_PASSWORD}@timescaledb:5432/${POSTGRES_DB:-cryptobot}
      MINIO_ENDPOINT: minio:9000
      MLFLOW_TRACKING_URI: http://mlflow:5000
    depends_on:
      timescaledb:
        condition: service_healthy
      minio:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    healthcheck:
      test: [
        "CMD",
        "python",
        "-c",
        "import src.ml.signal_generator; print('ML service healthy')"
      ]
      interval: 60s
      timeout: 10s
      start_period: 30s
      retries: 3
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          memory: 1G

  # --- Reverse Proxy ---
  nginx:
    image: nginx:1.27.1-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - nginx-logs-data:/var/log/nginx
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: [
        "CMD",
        "wget",
        "--quiet",
        "--tries=1",
        "--spider",
        "http://127.0.0.1/health"
      ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - frontend-net

  # --- Monitoring ---
  prometheus:
    image: prom/prometheus:v2.52.0
    restart: unless-stopped
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: [
        "CMD",
        "wget",
        "--quiet",
        "--tries=1",
        "--spider",
        "http://localhost:9090/-/healthy"
      ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          memory: 512M

  grafana:
    image: grafana/grafana:10.4.2
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/provisioning/alerts.yml:/etc/grafana/provisioning/alerts.yml:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: [
        "CMD",
        "wget",
        "--quiet",
        "--tries=1",
        "--spider",
        "http://localhost:3000/api/health"
      ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          memory: 256M

  # node-exporter: Linux only — uncomment on production VPS
  # node-exporter:
  #   image: prom/node-exporter:v1.8.0
  #   restart: unless-stopped
  #   command:
  #     - "--path.rootfs=/host"
  #   volumes:
  #     - /:/host:ro,rslave
  #   networks:
  #     - backend-net
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 64M

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-cryptobot}:${POSTGRES_PASSWORD}@timescaledb:5432/${POSTGRES_DB:-cryptobot}?sslmode=disable"
    depends_on:
      timescaledb:
        condition: service_healthy
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          memory: 64M

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.1.0
    restart: unless-stopped
    command:
      - "--nginx.scrape-uri=http://nginx:8080/stub_status"
    depends_on:
      - nginx
    networks:
      - frontend-net
      - backend-net
    deploy:
      resources:
        limits:
          memory: 32M

  # cadvisor: Linux only — uncomment on production VPS
  # cadvisor:
  #   image: gcr.io/cadvisor/cadvisor:v0.49.1
  #   restart: unless-stopped
  #   volumes:
  #     - /:/rootfs:ro
  #     - /var/run:/var/run:ro
  #     - /sys:/sys:ro
  #     - /var/lib/docker/:/var/lib/docker:ro
  #     - /dev/disk/:/dev/disk:ro
  #   privileged: true
  #   devices:
  #     - /dev/kmsg:/dev/kmsg
  #   networks:
  #     - backend-net
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 256M

volumes:
  timescaledb-data:
  minio-data:
  prometheus-data:
  grafana-data:
  nginx-logs-data:

networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge
