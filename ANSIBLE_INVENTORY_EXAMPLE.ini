# Production Inventory for VPS at 3.253.52.249
# 
# INSTRUCTIONS:
# 1. Copy this file: cp ANSIBLE_INVENTORY_EXAMPLE.ini infra/ansible/inventories/production.ini
# 2. Replace YOUR_DOMAIN and YOUR_EMAIL with your actual values
# 3. Ensure SSH key path is correct
# 4. Run: ansible-playbook -i infra/ansible/inventories/production.ini infra/ansible/playbooks/provision.yml

[vps]
cryptobot-prod ansible_host=3.253.52.249 ansible_user=root

[vps:vars]
# REQUIRED: Your domain name (for SSL certificates)
domain_name=YOUR_DOMAIN

# REQUIRED: Email for Let's Encrypt (for certificate renewal notifications)
letsencrypt_email=YOUR_EMAIL

# Deploy user created during provisioning
deploy_user=deploy

# SSH private key path (must exist: ssh-keygen -t ed25519 -f ~/.ssh/crypto-bot-deploy -N "")
ansible_ssh_private_key_file=~/.ssh/crypto-bot-deploy

# SSH options
ansible_ssh_common_args='-o StrictHostKeyChecking=accept-new -o ConnectTimeout=10'


# EXAMPLES:
# 
# [vps]
# cryptobot-prod ansible_host=3.253.52.249 ansible_user=root
#
# [vps:vars]
# domain_name=crypto-bot.example.com
# letsencrypt_email=admin@example.com
# deploy_user=deploy
# ansible_ssh_private_key_file=~/.ssh/crypto-bot-deploy
# ansible_ssh_common_args='-o StrictHostKeyChecking=accept-new -o ConnectTimeout=10'
