# GitHub Actions Workflow: Tests
#
# REQUIRED SECRETS (configure in GitHub repository settings):
# - None required for this workflow
#
# OPTIONAL SECRETS:
# - SLACK_WEBHOOK_URL: For Slack notifications on test failures
#
# To configure secrets:
# 1. Go to: https://github.com/YOUR_ORG/roulio-mars/settings/secrets/actions
# 2. Click "New repository secret"
# 3. Add the secrets listed above

name: Run Tests

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  test:
    name: Run Python Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run tests
        run: |
          python -m pytest tests/ -v
