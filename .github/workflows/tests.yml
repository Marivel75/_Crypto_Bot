# GitHub Actions Workflow: Tests (Lint → Type Check → Test → Build)
#
# This comprehensive CI pipeline ensures code quality across the project:
# - Linting with ruff (code style, imports, security)
# - Type checking with mypy (strict type safety)
# - Unit & integration tests with pytest + coverage gate (80% minimum)
# - Docker image build validation (ensures Dockerfiles are correct)
#
# REQUIRED SECRETS:
# - None (all testing happens locally)
#
# OPTIONAL SECRETS:
# - SLACK_WEBHOOK_URL: For Slack notifications on CI failure

name: CI Pipeline

on:
  push:
    branches: [ main, dev, roulio-mars ]
  pull_request:
    branches: [ main, dev ]

env:
  PYTHON_VERSION: "3.11"
  PIP_NO_CACHE_DIR: "1"

jobs:
  # ========== LINT ==========
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install ruff

      - name: Lint with ruff check
        run: ruff check src/ tests/ --select=E,W,F,I,B,C4,UP,SIM,S,T20

      - name: Format check with ruff format
        run: ruff format src/ tests/ --check

  # ========== TYPE CHECK ==========
  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt mypy

      - name: Type check with mypy
        run: mypy src/ --ignore-missing-imports --show-error-codes

  # ========== UNIT & INTEGRATION TESTS ==========
  test:
    name: Test (pytest + coverage)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [ lint, typecheck ]

    services:
      timescaledb:
        image: timescale/timescaledb:2.14.2-pg16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Wait for TimescaleDB to be ready
        run: |
          python << 'EOFPYTHON'
          import socket
          import time
          import sys

          sock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
          for attempt in range(30):
              try:
                  sock.connect(('localhost', 5432))
                  sock.close()
                  print('TimescaleDB is ready')
                  sys.exit(0)
              except (socket.error, socket.timeout) as e:
                  if attempt < 29:
                      print(f'Attempt {attempt + 1}: waiting for TimescaleDB...')
                      time.sleep(1)
          print('TimescaleDB failed to start after 30 attempts')
          sys.exit(1)
          EOFPYTHON

      - name: Run tests with pytest
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=html \
            --cov-fail-under=80 \
            -v \
            --tb=short

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7

  # ========== DOCKER BUILD VALIDATION ==========
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [ test ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: src/api/Dockerfile
          tags: cryptobot-api:latest
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: src/frontend/Dockerfile
          tags: cryptobot-frontend:latest
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build ETL image
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: src/etl/Dockerfile
          tags: cryptobot-etl:latest
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build ML image
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: src/ml/Dockerfile
          tags: cryptobot-ml:latest
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ========== SLACK NOTIFICATION ==========
  notify-slack:
    name: Notify Slack (on failure)
    runs-on: ubuntu-latest
    if: failure() && github.event_name == 'pull_request'
    needs: [ lint, typecheck, test, build ]

    steps:
      - name: Notify Slack on CI failure
        if: secrets.SLACK_WEBHOOK_URL
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "CI Pipeline Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*CI Pipeline Status: FAILED*\nRepository: ${{ github.repository }}\nBranch: ${{ github.ref }}\nCommit: ${{ github.sha }}\nAuthor: ${{ github.actor }}"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "View Run" },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
