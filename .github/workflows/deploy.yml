# GitHub Actions Workflow: Build & Deploy to Production
#
# REQUIRED SECRETS (configure in GitHub repository settings):
# - DOCKER_REGISTRY_USERNAME: Docker Hub (or private registry) username
# - DOCKER_REGISTRY_PASSWORD: Docker Hub (or private registry) password/token
# - VPS_SSH_KEY: Private SSH key for accessing production VPS (OpenSSH format)
# - VPS_HOST: Production VPS hostname or IP address (e.g., deploy.example.com)
#
# OPTIONAL SECRETS:
# - SLACK_WEBHOOK_URL: For Slack notifications on deployment success/failure
#
# To configure secrets:
# 1. Go to: https://github.com/YOUR_ORG/roulio-mars/settings/secrets/actions
# 2. Click "New repository secret"
# 3. Add each secret listed above:
#    - DOCKER_REGISTRY_USERNAME: your_docker_username
#    - DOCKER_REGISTRY_PASSWORD: your_docker_token (use access tokens, not passwords)
#    - VPS_SSH_KEY: (paste your OpenSSH private key here)
#    - VPS_HOST: 192.168.1.100 (or your VPS hostname)
#
# SSH Key Generation:
# ssh-keygen -t ed25519 -f ~/.ssh/deploy_key -N ""
# Add ~/.ssh/deploy_key.pub to ~/.ssh/authorized_keys on VPS
# Paste the contents of ~/.ssh/deploy_key as VPS_SSH_KEY secret
#
# Docker Registry Authentication:
# For Docker Hub: use access token (https://hub.docker.com/settings/security)
# For private registry: use registry-specific credentials

name: Build & Deploy

on:
  push:
    branches: [ main ]

jobs:
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}
      
      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: src/api/Dockerfile
          tags: ${{ secrets.DOCKER_REGISTRY_USERNAME }}/cryptobot-api:latest
          push: true
      
      - name: Build Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: src/frontend/Dockerfile
          tags: ${{ secrets.DOCKER_REGISTRY_USERNAME }}/cryptobot-frontend:latest
          push: true
      
      - name: Build ETL image
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: src/etl/Dockerfile
          tags: ${{ secrets.DOCKER_REGISTRY_USERNAME }}/cryptobot-etl:latest
          push: true
      
      - name: Build ML image
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: src/ml/Dockerfile
          tags: ${{ secrets.DOCKER_REGISTRY_USERNAME }}/cryptobot-ml:latest
          push: true
  
  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy via Ansible
        env:
          DEPLOY_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts
          
          # Run Ansible deployment playbook
          ansible-playbook -i "$VPS_HOST," \
            -e "ansible_user=deploy" \
            -e "ansible_ssh_private_key_file=~/.ssh/deploy_key" \
            -e "docker_username=$DOCKER_USERNAME" \
            infra/ansible/playbooks/deploy.yml
      
      - name: Notify Slack (optional)
        if: always()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "Deployment ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Deployment Status*\nRepository: ${{ github.repository }}\nBranch: ${{ github.ref }}\nStatus: ${{ job.status }}\nCommit: ${{ github.sha }}"
                  }
                }
              ]
            }
