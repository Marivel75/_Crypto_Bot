---
# Backup TimescaleDB and MinIO data
# Usage: ansible-playbook -i inventories/production.ini playbooks/backup.yml
# Cron: ansible-playbook -i inventories/production.ini playbooks/backup.yml (daily at 3 AM)

- name: Backup Crypto Bot Data
  hosts: vps
  become: true
  become_user: "{{ deploy_user }}"
  vars_files:
    - ../group_vars/vps.yml

  tasks:
    - name: Create backup directory
      file:
        path: "{{ docker_compose_dir }}/backups"
        state: directory
        mode: "0750"

    - name: Backup TimescaleDB
      shell: |
        docker compose exec -T timescaledb pg_dump \
          -U ${POSTGRES_USER:-cryptobot} \
          -d ${POSTGRES_DB:-cryptobot} \
          --format=custom \
          --compress=9 \
          > {{ docker_compose_dir }}/backups/timescaledb_$(date +%Y%m%d_%H%M%S).dump
      args:
        chdir: "{{ docker_compose_dir }}"
      changed_when: true

    - name: Remove old daily backups (> {{ backup_retention_days }} days)
      find:
        paths: "{{ docker_compose_dir }}/backups"
        patterns: "timescaledb_*.dump"
        age: "{{ backup_retention_days }}d"
      register: old_backups

    - name: Delete old backups
      file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ old_backups.files }}"

    - name: Upload backup to MinIO
      shell: |
        LATEST=$(ls -t {{ docker_compose_dir }}/backups/timescaledb_*.dump | head -1)
        docker compose exec -T minio mc alias set local http://localhost:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}
        docker compose exec -T minio mc mb --ignore-existing local/{{ backup_bucket }}
        docker compose cp "$LATEST" minio:/tmp/backup.dump
        docker compose exec -T minio mc cp /tmp/backup.dump local/{{ backup_bucket }}/$(basename "$LATEST")
      args:
        chdir: "{{ docker_compose_dir }}"
      changed_when: true
      ignore_errors: true

    - name: Show backup status
      shell: "ls -lah {{ docker_compose_dir }}/backups/timescaledb_*.dump | tail -5"
      register: backup_list
      changed_when: false

    - name: Display backups
      debug:
        var: backup_list.stdout_lines
